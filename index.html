<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phong Cách Học Tập</title>
    <style>
        body { font-family: 'Times New Roman', serif; background: #f4f1ea; display: flex; justify-content: center; padding: 20px; }
        .editorial-container { 
            max-width: 1200px; width: 100%; padding: 40px; 
            background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(6px);
            border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }
        .styles-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .style-card { 
            background: #f0f5ff; border: 1px solid #d6e4ff; padding: 20px; 
            border-radius: 12px; text-align: center;
        }
        .card-image-wrapper img { max-width: 100%; height: auto; border-radius: 8px; }
    </style>
</head>
<body>

<div class="editorial-container">
    <div class="styles-grid">
        <div class="style-card">
            <h3>A. Visual Learner</h3>
            <div class="card-image-wrapper">
                <img src="anh a.png" alt="Visual Learner">
            </div>
            <p>Đồng chí học tốt nhất qua hình ảnh, sơ đồ, video.</p>
        </div>
        
        </div>
</div>

</body>
</html>
